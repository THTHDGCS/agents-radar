# agents-radar configuration — Embodied Intelligence / VLA / Robotics
# Edit this file to customize which repositories are tracked.

# ── Robotics / Embodied AI projects ──────────────────────────────────────────
# Tracked for per-project digests and cross-project comparison.
# Each entry requires: id (filename slug), repo (owner/repo), name (display name).
# Set paginated: true for high-volume repos with many daily updates.

cli_repos:
  - id: ros2
    repo: ros2/ros2
    name: ROS 2
  - id: isaac-lab
    repo: isaac-sim/IsaacLab
    name: NVIDIA Isaac Lab
  - id: genesis
    repo: Genesis-Embodied-AI/Genesis
    name: Genesis
  - id: lerobot
    repo: huggingface/lerobot
    name: LeRobot
  - id: openvla
    repo: openvla/openvla
    name: OpenVLA

# ── Claude Code Skills ────────────────────────────────────────────────────────
# Tracked separately without a date filter, sorted by community engagement.

skills_repo: anthropics/skills

# ── Primary focus project ────────────────────────────────────────────────────
# Tracked with a dedicated deep-dive report. Set paginated: true for high-volume repos.

openclaw:
  id: unitree-sdk
  repo: unitreerobotics/unitree_sdk2
  name: Unitree SDK2
  paginated: true

# ── Peer projects ────────────────────────────────────────────────────────────
# Tracked alongside the primary project for cross-ecosystem comparison.

openclaw_peers:
  - id: mujoco
    repo: google-deepmind/mujoco
    name: MuJoCo
    paginated: true
  - id: drake
    repo: RobotLocomotion/drake
    name: Drake
